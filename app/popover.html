<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Savage Dice Overlay</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: transparent; overflow: hidden; width: 100%; height: 100%; }
      #dice-canvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 100;
        display: none;
      }
      #dice-canvas.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="dice-canvas"></div>
    <script type="module" src="/src/popover.ts"></script>
  </body>
</html>
